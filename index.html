<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .stats-card { background: #2d2d2d; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stats-row { display: flex; justify-content: space-between; margin: 5px 0; }
        .total { font-size: 1.2em; font-weight: bold; color: #4CAF50; border-top: 1px solid #444; pt: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #3d3d3d; color: white; box-sizing: border-box; }
        .btn-send { background: #fca311; color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1em; margin-top: 10px; }
        .income { color: #4CAF50; }
        .expense { color: #ff4d4d; }
    </style>
</head>
<body>
    <div class="stats-card">
        <div class="stats-row"><span>Доход:</span> <span class="income" id="inc-val">0$</span></div>
        <div class="stats-row"><span>Убыток:</span> <span class="expense" id="exp-val">0$</span></div>
        <div class="stats-row total"><span>Общий баланс:</span> <span id="total-val">0$</span></div>
    </div>

    <div class="input-group">
        <label>Тип операции</label>
        <select id="type">
            <option value="inc">Доход (+)</option>
            <option value="exp">Убыток (-)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Сумма ($)</label>
        <input type="number" id="amount" placeholder="Например: 5000">
    </div>

    <div class="input-group">
        <label>Комментарий</label>
        <input type="text" id="comment" placeholder="Например: Продажа рыбы">
    </div>

    <button class="btn-send" onclick="sendData()">Добавить запись</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function sendData() {
            let type = document.getElementById('type').value;
            let amount = document.getElementById('amount').value;
            let comment = document.getElementById('comment').value;

            if (amount === "" || amount <= 0) {
                alert("Введите корректную сумму!");
                return;
            }

            // Отправляем данные обратно в бота
            let data = {
                type: type,
                amount: amount,
                comment: comment
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
