<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTA 5 RP Finance Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #eab308; /* Классический желтый GTA */
            --success: #4ade80;
            --danger: #f87171;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(234, 179, 8, 0.3);
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 2px solid #27272a;
            background: #27272a;
            color: var(--text-main);
            font-size: 18px;
            font-weight: bold;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .divider {
            height: 1px;
            background: #3f3f46;
            margin: 24px 0;
        }

        .profit-section {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        .profit-label {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .profit-value {
            font-size: 36px;
            font-weight: 900;
            color: var(--text-main);
            word-break: break-all;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #52525b;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>GTA5RP</h1>
            <p>Финансовый трекер</p>
        </div>

        <div class="input-group">
            <label>Доход ($)</label>
            <input type="number" id="income" placeholder="0" oninput="calculateProfit()">
        </div>

        <div class="input-group">
            <label>Траты ($)</label>
            <input type="number" id="expense" placeholder="0" oninput="calculateProfit()">
        </div>

        <div class="divider"></div>
        <div class="profit-section">
            <div class="profit-label">Чистая прибыль</div>
            <div class="profit-value" id="netProfit">$0</div>
        </div>
    </div>
    
    <div class="footer">m0nixt12 • live tracker</div>

    <script>
        // Сообщаем Telegram, что приложение готово и его можно развернуть на весь экран
        let tg = window.Telegram.WebApp;
        tg.expand();

        function calculateProfit() {
            let incomeInput = document.getElementById('income').value;
            let expenseInput = document.getElementById('expense').value;

            // Преобразуем введенные данные в числа, если пусто — считаем за 0
            let income = parseFloat(incomeInput) || 0;
            let expense = parseFloat(expenseInput) || 0;

            let profit = income - expense;
            let profitElement = document.getElementById('netProfit');

            // Обновляем текст и форматируем числа для красоты (например, 1 000 000)
            profitElement.innerText = '$' + profit.toLocaleString('en-US');

            // Меняем цвет в зависимости от того, в плюсе мы или в минусе
            if (profit > 0) {
                profitElement.style.color = 'var(--success)';
            } else if (profit < 0) {
                profitElement.style.color = 'var(--danger)';
            } else {
                profitElement.style.color = 'var(--text-main)';
            }
        }
    </script>
</body>
</html>
