<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #4ecca3; }
        label { display: block; margin: 10px 0 5px; font-size: 14px; }
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #0f3460;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h2>Фарм Менеджер</h2>
    
    <label>Тип операции</label>
    <select id="type">
        <option value="inc">Доход (+)</option>
        <option value="exp">Убыток (-)</option>
    </select>

    <label>Сумма ($)</label>
    <input type="number" id="amount" placeholder="Введите сумму..." inputmode="numeric">

    <label>Комментарий</label>
    <input type="text" id="comment" placeholder="Например: Перевозка почты">

    <button id="saveBtn">Сохранить запись</button>
</div>

<script>
    // Инициализация Telegram WebApp
    let tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем на весь экран

    let saveBtn = document.getElementById("saveBtn");

    saveBtn.addEventListener("click", () => {
        let type = document.getElementById("type").value;
        let amount = document.getElementById("amount").value;
        let comment = document.getElementById("comment").value;

        // Проверка на пустую сумму
        if (amount.length === 0 || parseInt(amount) <= 0) {
            alert("Пожалуйста, введите корректную сумму");
            return;
        }

        // Собираем данные в объект
        let data = {
            type: type,
            amount: amount,
            comment: comment || "Без комментария"
        };

        // ОТПРАВКА ДАННЫХ БОТУ (Важнейшая часть!)
        // Это заставит бота сработать на content_type == 'web_app_data'
        tg.sendData(JSON.stringify(data)); 
        
        // Закрываем приложение после отправки
        tg.close();
    });
</script>

</body>
</html>
