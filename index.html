<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monixt12 Farm Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .btn { background: #0088cc; border: none; color: white; padding: 15px 30px; border-radius: 10px; font-size: 18px; margin: 10px; cursor: pointer; width: 80%; }
        .btn-stop { background: #cc3300; }
        .status { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h2>Панель управления Farm Bot</h2>
    <button class="btn" onclick="sendCommand('start_farm')">Запустить фарм</button>
    <button class="btn btn-stop" onclick="sendCommand('stop_farm')">Остановить</button>
    <div class="status" id="stat">Статус: Ожидание...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendCommand(cmd) {
            fetch('/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('stat').innerText = "Статус: " + data.message;
            });
        }
    </script>
</body>
</html>
