<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет Фарма GTA 5 RP</title>
    <style>
        /* Основные стили, соответствующие эталону */
        body {
            background-color: #0d1117; /* Очень темный, почти черный фон */
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Контейнер приложения */
        .app-window {
            background-color: #161b22; /* Чуть более светлый темный фон */
            width: 380px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid #21262d;
        }

        /* Общие стили карточек данных */
        .card {
            background-color: #0d1117;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: #007bff; /* Синее свечение при наведении */
        }

        .card-label {
            color: #8b949e; /* Тусклый серый для подписей */
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
        }

        /* Уникальные стили для Чистой прибыли */
        .net-profit {
            margin-top: -10px; /* Выравнивание по фото */
        }

        /* Сетка для Дохода и Расхода */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Цвета значений */
        .income-value { color: #2ea043; } /* Зеленый для дохода */
        .expense-value { color: #f85149; } /* Красный для расхода */

        /* Стили полей ввода */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            color: #ffffff;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box; /* Важно для padding */
            transition: border-color 0.3s;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }

        /* Стиль кнопки "Сохранить" */
        .btn-save {
            width: 100%;
            padding: 16px;
            background-color: #007bff; /* Яркий синий */
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .btn-save:hover {
            background-color: #0069d9;
        }

        .btn-save:active {
            transform: translateY(1px);
        }

        /* Кнопка сброса (скрытая, для админа) */
        .btn-reset {
            background: none;
            border: none;
            color: #30363d;
            font-size: 10px;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-window">
        <div class="card net-profit">
            <div class="card-label">Чистая прибыль</div>
            <div id="total-profit" class="card-value">0$</div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <div class="card-label">Весь доход</div>
                <div id="total-income" class="card-value income-value">0$</div>
            </div>
            <div class="card">
                <div class="card-label">Весь расход</div>
                <div id="total-expense" class="card-value expense-value">0$</div>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Тип транзакции</label>
            <select id="transaction-type">
                <option value="income">Доход (+)</option>
                <option value="expense">Расход (-)</option>
            </select>
        </div>

        <div class="input-group">
            <label class="input-label">Сумма фарма</label>
            <input type="number" id="amount-input" placeholder="Введите сумму..." min="0">
        </div>

        <button class="btn-save" onclick="saveTransaction()">Сохранить</button>

        <button class="btn-reset" onclick="resetData()">Сброс данных</button>
    </div>

        }
