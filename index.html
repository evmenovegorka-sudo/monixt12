<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 15px; margin: 0; }
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #1e293b; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .full-width { grid-column: span 2; border-color: #3b82f6; }
        .label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .value { font-size: 20px; font-weight: bold; }
        .income { color: #22c55e; }
        .expense { color: #ef4444; }
        .input-group { background: #1e293b; padding: 20px; border-radius: 15px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="stats-container">
        <div class="stat-card full-width">
            <div class="label">Чистая прибыль</div>
            <div class="value" id="disp_total">0$</div>
        </div>
        <div class="stat-card">
            <div class="label">Весь доход</div>
            <div class="income value" id="disp_inc">0$</div>
        </div>
        <div class="stat-card">
            <div class="label">Весь расход</div>
            <div class="expense value" id="disp_exp">0$</div>
        </div>
    </div>

    <div class="input-group">
        <select id="type">
            <option value="inc">Доход (+)</option>
            <option value="exp">Расход (-)</option>
        </select>
        <input type="number" id="amount" placeholder="Сумма фармa" inputmode="numeric">
        <button onclick="updateAndSend()">Сохранить</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Переменные для хранения текущих значений на экране
        let currentInc = 0;
        let currentExp = 0;

        function updateAndSend() {
            let type = document.getElementById('type').value;
            let val = parseInt(document.getElementById('amount').value);

            if (!val || val <= 0) {
                alert("Введите сумму!");
                return;
            }

            // 1. МГНОВЕННОЕ ОБНОВЛЕНИЕ ЦИФР НА ЭКРАНЕ (без выхода)
            if (type === 'inc') {
                currentInc += val;
            } else {
                currentExp += val;
            }

            // Обновляем текст в табличках по их ID
            document.getElementById('disp_inc').innerText
