<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 5 RP Farm Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MAJESTIC <span class="accent">FARM</span></h1>
            <p>Статистика персонажа: <strong id="nickname">m0nixt12</strong></p>
        </header>

        <div class="stats-grid">
            <div class="card">
                <h3>Собрано ресурсов</h3>
                <p id="items-count" class="value">0</p>
            </div>
            <div class="card">
                <h3>Заработано ($)</h3>
                <p id="money-count" class="value">0</p>
            </div>
        </div>

        <div class="controls">
            <button onclick="updateStats(1, 500)" class="btn-farm">Фармить</button>
            <button onclick="resetStats()" class="btn-reset">Сбросить смену</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
